<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yanımda Al - Dijital Refakatçi</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #EBF8FF 0%, #EEF2F6 100%);
            --text-main: #1E293B;
            --text-muted: #64748B;
            --brand-color: #3B82F6;
            --brand-gradient: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
            --success-color: #10B981;
            --success-gradient: linear-gradient(135deg, #10B981 0%, #047857 100%);
            --warning-color: #EF4444;
            --warning-gradient: linear-gradient(135deg, #EF4444 0%, #B91C1C 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Sayfanın aşağı kaymasını tamamen engelliyoruz */
        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-size: 24px;
        }

        header {
            text-align: center;
            padding: 15px;
            background: var(--card-bg);
            border-bottom: 1px solid #E2E8F0;
            box-shadow: 0 4px 10px rgba(148, 163, 184, 0.05);
        }

        header h1 {
            font-size: 32px;
            font-weight: 800;
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Ana İçerik Alanı (Sabit Yükseklik) */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .page {
            display: none; /* Varsayılan olarak gizli */
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            border-radius: 28px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 15px 35px rgba(148, 163, 184, 0.12);
            height: 100%;
            max-height: 500px;
            flex-direction: column;
            justify-content: center;
        }

        /* Aktif sayfayı göster */
        .page.active {
            display: flex;
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #0F172A;
            text-align: center;
        }

        /* Büyük Yaşlı Dostu Butonlar */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 22px;
            font-size: 26px;
            font-weight: 700;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-voice {
            background: var(--brand-gradient);
            color: white;
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.3);
            font-size: 28px;
            padding: 24px;
        }

        .btn-voice.recording {
            background: var(--warning-gradient);
            animation: pulse 1.8s infinite;
        }

        .btn-success {
            background: var(--success-gradient);
            color: white;
        }

        .btn-neutral {
            background: #F1F5F9;
            color: #475569;
            border: 2px solid #E2E8F0;
        }

        /* Mesajlaşma Alanı Kontrolleri */
        .chat-container {
            background: #F8FAFC;
            border-radius: 22px;
            padding: 15px;
            border: 1px solid #E2E8F0;
            margin-bottom: 15px;
            flex: 1;
            overflow-y: auto;
        }

        .chat-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-msg {
            padding: 14px 18px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 22px;
            line-height: 1.4;
        }

        .msg-ai {
            background: #FFFFFF;
            color: #1E293B;
            border-bottom-left-radius: 4px;
            border: 1px solid #E2E8F0;
            align-self: flex-start;
        }

        .msg-user {
            background: #DCEFFE;
            color: #1E40AF;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        /* İlaç Listesi Kontrolleri */
        .routine-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            flex: 1;
        }

        .routine-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 20px;
        }

        .routine-item.done {
            background: #F0FDF4;
            border-color: #BBF7D0;
        }

        /* ALT GEZİNME MENÜSÜ (BÜYÜK VE SABİT) */
        nav {
            background: #FFFFFF;
            border-top: 2px solid #E2E8F0;
            display: flex;
            width: 100%;
            height: 100px;
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.2s ease;
        }

        .nav-btn span:first-child {
            font-size: 32px; /* İkon boyutu */
        }

        .nav-btn.active {
            color: var(--brand-color);
            background: #F0F7FF;
            border-top: 4px solid var(--brand-color);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Üst Başlık -->
    <header>
        <h1>Yanımda Al</h1>
    </header>

    <!-- Sayfa İçerikleri (Sadece aktif olan görünür) -->
    <div class="main-content">

        <!-- 1. SAYFA: SOHBET (VARSAYILAN) -->
        <div class="page active" id="page-sohbet">
            <div class="page-title">💬 Refakatçi Sohbeti</div>
            <div class="chat-container" id="chatScroll">
                <div class="chat-box" id="chatBox">
                    <div class="chat-msg msg-ai">Merhaba Ahmet Amca, sesini duymak çok güzel. Bugün nasılsın?</div>
                </div>
            </div>
            <button class="btn btn-voice" id="voiceBtn" onclick="toggleVoice()">
                🎤 <span id="btnText">Konuşmak İçin Basın</span>
            </button>
        </div>

        <!-- 2. SAYFA: İLAÇLAR VE GÖREVLER -->
        <div class="page" id="page-ilaclar">
            <div class="page-title">📋 Bugünkü İlaçlarım</div>
            <div class="routine-list">
                <div class="routine-item" id="med1">
                    <div>
                        <strong style="display:block; font-size:22px;">💊 Tansiyon İlacı</strong>
                        <span style="font-size: 16px; color: var(--text-muted);">Sabah • Saat 09:00</span>
                    </div>
                    <button class="btn btn-success" style="width:auto; padding: 10px 20px; font-size: 18px;" onclick="takeMed('med1')">İçtim</button>
                </div>

                <div class="routine-item" id="med2">
                    <div>
                        <strong style="display:block; font-size:22px;">📸 Vitamin Takviyesi</strong>
                        <span style="font-size: 16px; color: var(--text-muted);">Akşam • Saat 20:00</span>
                    </div>
                    <div style="display:flex; gap: 8px;">
                        <button class="btn btn-neutral" style="width:auto; padding: 10px 20px; font-size: 18px;" onclick="simulatePhoto()">Kamerayla Çek</button>
                        <button class="btn btn-success" style="width:auto; padding: 10px 20px; font-size: 18px;" onclick="takeMed('med2')">İçtim</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. SAYFA: SABAH KONTROLÜ -->
        <div class="page" id="page-durum">
            <div class="page-title">☀️ Günlük Sağlık Kontrolü</div>
            <div id="checkinCard" style="text-align: center; display: flex; flex-direction: column; gap: 20px; justify-content: center; height: 100%;">
                <p style="font-weight: 600; font-size: 26px;">Ahmet Amca, bugün kendini nasıl hissediyorsun?</p>
                <button class="btn btn-success" onclick="completeCheckin('Harika!')">😊 Çok İyiyim</button>
                <button class="btn btn-neutral" style="background: #FFFBEB; color: #B45309; border-color: #FDE68A;" onclick="completeCheckin('Biraz halsizim')">😐 Biraz Halsizim</button>
            </div>
        </div>

    </div>

    <!-- ALT BÜYÜK GEZİNME MENÜSÜ -->
    <nav>
        <button class="nav-btn active" id="nav-sohbet" onclick="switchPage('sohbet')">
            <span>💬</span>
            <span>Sohbet</span>
        </button>
        <button class="nav-btn" id="nav-ilaclar" onclick="switchPage('ilaclar')">
            <span>💊</span>
            <span>İlaçlarım</span>
        </button>
        <button class="nav-btn" id="nav-durum" onclick="switchPage('durum')">
            <span>☀️</span>
            <span>Durumum</span>
        </button>
    </nav>

    <script>
        let isRecording = false;
        const voiceBtn = document.getElementById('voiceBtn');
        const btnText = document.getElementById('btnText');
        const chatBox = document.getElementById('chatBox');
        const chatScroll = document.getElementById('chatScroll');

        // Sekme Değiştirme Fonksiyonu (Scroll'u sıfırlar, ekranı sabit tutar)
        function switchPage(pageId) {
            // Tüm sayfaları ve menü butonlarını pasifleştir
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));

            // Seçilen sayfayı ve butonu aktif et
            document.getElementById(`page-${pageId}`).classList.add('active');
            document.getElementById(`nav-${pageId}`).classList.add('active');
        }

        // Sesli asistan simülasyonu
        function toggleVoice() {
            if (!isRecording) {
                isRecording = true;
                voiceBtn.classList.add('recording');
                btnText.innerText = "Sizi Dinliyorum...";
                
                setTimeout(() => {
                    if(isRecording) toggleVoice();
                    addChatMessage("Bugün biraz bahçede dolaştım, hava çok güzel.", "user");
                    setTimeout(() => {
                        addChatMessage("Harika Ahmet Amca! Temiz hava almak sana çok iyi gelmiştir. Kendini yormadan dinlenmeyi unutma.", "ai");
                    }, 1000);
                }, 3500);
            } else {
                isRecording = false;
                voiceBtn.classList.remove('recording');
                btnText.innerText = "Konuşmak İçin Basın";
            }
        }

        function addChatMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-msg msg-${sender}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatScroll.scrollTop = chatScroll.scrollHeight;
        }

        function completeCheckin(mood) {
            document.getElementById('checkinCard').innerHTML = `
                <span style="font-size: 64px;">✔️</span>
                <h2 style="color: var(--success-color); font-size: 30px; font-weight: 800;">Durumunuz Bildirildi</h2>
                <p style="font-size: 20px; color: var(--text-muted);">Aileniz harika olduğunuzu biliyor!</p>
            `;
            addChatMessage(`Günlük sağlık kontrolü yapıldı: ${mood}`, "user");
        }

        function takeMed(id) {
            const item = document.getElementById(id);
            item.classList.add('done');
            item.querySelectorAll('button').forEach(btn => btn.style.display = 'none');
            
            const checkMark = document.createElement('span');
            checkMark.innerText = "✓ Tamamlandı";
            checkMark.style.color = "var(--success-color)";
            checkMark.style.fontWeight = "700";
            item.appendChild(checkMark);
        }

        function simulatePhoto() {
            alert("📷 Kamera açıldı, kutu doğrulandı!");
            takeMed('med2');
        }
    </script>
</body>
</html>
