<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanımda Al - Giriş Yap</title>
    <link rel="stylesheet" href="sheet.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Yanımda Al</h1>
            <p>Dijital Refakatçi Sistemine Hoş Geldiniz</p>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" onclick="switchAuthTab('elderly')">👵👴 Yaşlı Girişi</button>
            <button class="tab-btn" onclick="switchAuthTab('family')">👨‍👩‍👧‍👦 Aile Girişi</button>
        </div>

<div id="tab-elderly" class="tab-content active">
        <div class="webcam-container">
            <video id="webcam" autoplay playsinline></video>
            <div class="camera-overlay"></div>
            </div>
            <p id="face-status" class="status-text">Kamera hazırlanıyor...</p>
    
            <button type="button" class="btn btn-primary" onclick="startFaceRecognition()">
            <i class="fas fa-camera"></i> Yüzü Tara ve Giriş Yap
            </button>

        <div class="alternative-login" style="margin-top: 25px; padding-top: 20px; border-top: 1px dashed #ccc;">
            <p style="text-align: center; font-weight: bold; color: #555;">Veya Bilgilerinle Giriş Yap:</p>
            <div class="form-group" style="margin-bottom: 10px;">
                <input type="text" id="elderly-login-name" class="form-control" placeholder="Adınız Soyadınız (Örn: Ahmet Yılmaz)">
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                <input type="number" id="elderly-login-age" class="form-control" placeholder="Yaşınız">
            </div>
                <button type="button" class="btn btn-secondary" onclick="loginWithCredentials()" style="background-color: #6c757d; width: 100%;">
                    Bilgilerimle Giriş Yap
                </button>
            </div>
        </div>

        <div id="tab-family" class="tab-content">
            <form id="family-login-form" onsubmit="handleFamilyLogin(event)">
                <div class="form-group">
                    <label for="login-phone">Telefon Numarası</label>
                    <input type="tel" id="login-phone" placeholder="5xx xxx xx xx" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Şifre</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">Giriş Yap</button>
            </form>
        </div>

        <div class="auth-footer">
            Hesabınız yok mu? <a href="register.html">Yeni Hesap Oluştur</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="authorization.js"></script>
</body>
</html>
